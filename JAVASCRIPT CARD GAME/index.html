<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post-Apocalyptic Card Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>☢️ Survivor Duel</h1>
  <div class="player" id="pl">
    <h2>Nomads</h2>
    <div class="stats">Health: <span id="p1-health">15</span> | Resources: <span id="p1-res">0</span></div>
    <div class="hand" id="p1-hand"></div>
  </div>
  <div class="player" id="p2">
    <h2>Raiders</h2>
    <div class="stats">Health: <span id="p2-health>15</span> | Resources: <span id="p2-res">0</span></div>
    <div class="hand" id="p2-hand"></div>
  </div>
  <div id="log"><strong>Game Log:</strong></div>

  <script src="game.js></script>
</body>
</html>
